version: 2
sources:
- name: abc_bank
  description: 'Point of Sale source data'
  database: PORTFOLIO_TRACKING
  schema: SOURCE_DATA
  tables:
  - name: ABC_BANK_POSITION
    description : "the landing data from CSV extracted by ABC Bank"
    columns:
    - name : ACCOUNTID
      description : "The code for the account at  ABC Bank."
      tests :
        - not_null
    - name : SYMBOL
      description : "The symbol of the security at ABC Bank."
      tests :
        - not_null
        - unique
    - name : DESCRIPTION
      description : "The short name or code of the exchange where the security is traded."
      tests :
        - not_null
    - name : REPORT_DATE
      description : "The date of the report was extracted by ABC Bank."
      tests :
        - not_null
    - name : QUANTITY
      description : "he cost we paid for the securities that we hold in the portfolio at ABC Bank at the Report Date."
      tests :
        - not_null
    - name : POSITION_VALUE
      description : "The value of the securities  in the portfolio at ABC Bank on the Report Date."
      tests :
        - not_null
    - name : CURRENCY
      description : "The currency for the monetary amounts of the position."
      tests:
        - not_null
  
  
